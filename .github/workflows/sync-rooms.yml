name: Sync rooms to Supabase

on:
  pull_request_target:
    types: [opened, synchronize]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'public/registry/**/config.json'

jobs:
  # On PR: update changed rooms in dev so preview reflects config
  # New reservations are mirrored to dev automatically via the mirror-to-dev Edge Function
  sync-prod-to-dev:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update changed rooms in dev
        env:
          SUPABASE_DEV_URL: ${{ secrets.SUPABASE_DEV_URL }}
          SUPABASE_DEV_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_DEV_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          const registryDir = 'public/registry';
          const folders = fs.readdirSync(registryDir).filter(f => {
            if (f === '_template') return false;
            return fs.existsSync(`${registryDir}/${f}/config.json`);
          });

          async function syncRoom(folder) {
            const config = JSON.parse(fs.readFileSync(`${registryDir}/${folder}/config.json`, 'utf8'));
            const name = config.room_display_name;
            if (!name) return;

            const res = await fetch(
              `${process.env.SUPABASE_DEV_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(folder)}`,
              {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': process.env.SUPABASE_DEV_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_DEV_SERVICE_ROLE_KEY}`,
                  'Prefer': 'return=representation',
                },
                body: JSON.stringify({ name, status: 'active' }),
              }
            );

            const data = await res.json();
            if (!res.ok) { console.error(`Failed: ${folder}`, data); process.exit(1); }
            if (!data.length) console.warn(`⚠ ${folder}: no row in dev — was it reserved?`);
            else console.log(`✓ ${folder} → "${name}", status: active`);
          }

          Promise.all(folders.map(syncRoom))
            .catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Free deleted rooms in dev
        env:
          SUPABASE_DEV_URL: ${{ secrets.SUPABASE_DEV_URL }}
          SUPABASE_DEV_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_DEV_SERVICE_ROLE_KEY }}
        run: |
          deleted=$(git diff --name-only origin/main...HEAD -- 'public/registry/' \
            | grep 'config\.json' \
            | sed 's|public/registry/||' \
            | sed 's|/config\.json||' \
            | grep -v '^_template$' \
            | while read folder; do
                [ ! -f "public/registry/$folder/config.json" ] && echo "$folder"
              done)
          echo "Deleted folders: $deleted"
          [ -z "$deleted" ] && echo "Nothing to free." && exit 0

          node << EOF
          const folders = \`$deleted\`.split('\n').map(f => f.trim()).filter(Boolean);

          async function deleteRoom(folder) {
            const res = await fetch(
              \`\${process.env.SUPABASE_DEV_URL}/rest/v1/rooms?registry_id=eq.\${encodeURIComponent(folder)}\`,
              {
                method: 'DELETE',
                headers: {
                  'apikey': process.env.SUPABASE_DEV_SERVICE_ROLE_KEY,
                  'Authorization': \`Bearer \${process.env.SUPABASE_DEV_SERVICE_ROLE_KEY}\`,
                  'Prefer': 'return=representation',
                },
              }
            );
            if (!res.ok) { const data = await res.json(); console.error(\`Failed to delete: \${folder}\`, data); process.exit(1); }
            console.log(\`✓ \${folder} deleted from dev\`);
          }

          Promise.all(folders.map(deleteRoom))
            .catch(err => { console.error(err); process.exit(1); });
          EOF

  # On merge to main: update changed rooms in prod, then sync prod → dev
  sync-on-merge:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed registry folders
        id: changed
        run: |
          folders=$(git diff --name-only HEAD~1 HEAD -- 'public/registry/' \
            | grep 'config\.json' \
            | sed 's|public/registry/||' \
            | sed 's|/config\.json||' \
            | grep -v '^_template$')
          echo "Found: $folders"
          echo "folders<<EOF" >> $GITHUB_OUTPUT
          echo "$folders" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update changed rooms in prod
        if: steps.changed.outputs.folders != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          const folders = `${{ steps.changed.outputs.folders }}`
            .split('\n').map(f => f.trim()).filter(Boolean);

          async function syncRoom(folder) {
            const configPath = `public/registry/${folder}/config.json`;
            if (!fs.existsSync(configPath)) {
              // Room folder was deleted — remove the row so the grid spot is freed
              const res = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(folder)}`,
                {
                  method: 'DELETE',
                  headers: {
                    'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    'Prefer': 'return=representation',
                  },
                }
              );
              if (!res.ok) { const data = await res.json(); console.error(`Failed to delete: ${folder}`, data); process.exit(1); }
              console.log(`✓ ${folder} deleted from prod`);
              return;
            }

            const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));
            const name = config.room_display_name;
            if (!name) return;

            const res = await fetch(
              `${process.env.SUPABASE_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(folder)}`,
              {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                  'Prefer': 'return=representation',
                },
                body: JSON.stringify({ name, status: 'active' }),
              }
            );

            const data = await res.json();
            if (!res.ok) { console.error(`Failed: ${folder}`, data); process.exit(1); }
            if (!data.length) console.warn(`No row found for registry_id="${folder}"`);
            else console.log(`✓ ${folder} → "${name}", status: active`);
          }

          Promise.all(folders.map(syncRoom))
            .catch(err => { console.error(err); process.exit(1); });
          EOF

      # Mirror prod → dev step removed: new reservations are mirrored automatically
      # via the mirror-to-dev Edge Function on INSERT
